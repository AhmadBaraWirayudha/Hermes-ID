apiVersion: v1
kind: Service
metadata:
  name: indomarket-frontend
spec:
  type: ClusterIP
  selector: { app: indomarket-frontend }
  ports: [{ port: 8501, targetPort: 8501 }]
---
apiVersion: v1
kind: Service
metadata:
  name: indomarket-api
spec:
  type: ClusterIP
  selector: { app: indomarket-api }
  ports: [{ port: 8000, targetPort: 8000 }]
