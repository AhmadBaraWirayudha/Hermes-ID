apiVersion: v1
kind: Pod
metadata:
  name: indomarket
  labels:
    app: indomarket
spec:
  containers:
    - name: frontend
      image: localhost/indomarket-insight:latest
      command: ["streamlit", "run", "app/main.py", "--server.address=0.0.0.0", "--server.port=8501", "--server.headless=true"]
      ports:
        - containerPort: 8501
          hostPort: 8501
      volumeMounts:
        - { name: data, mountPath: /app/data }
        - { name: models, mountPath: /app/models }
        - { name: logs, mountPath: /app/logs }
        - { name: config, mountPath: /app/config }
        - { name: backups, mountPath: /app/backups }
    - name: api
      image: localhost/indomarket-insight:latest
      command: ["uvicorn", "app.api:api", "--host", "0.0.0.0", "--port", "8000"]
      ports:
        - containerPort: 8000
          hostPort: 8000
      volumeMounts:
        - { name: data, mountPath: /app/data }
        - { name: models, mountPath: /app/models }
        - { name: logs, mountPath: /app/logs }
        - { name: config, mountPath: /app/config }
        - { name: backups, mountPath: /app/backups }
  volumes:
    - name: data
      hostPath: { path: ./data, type: DirectoryOrCreate }
    - name: models
      hostPath: { path: ./models, type: DirectoryOrCreate }
    - name: logs
      hostPath: { path: ./logs, type: DirectoryOrCreate }
    - name: config
      hostPath: { path: ./config, type: DirectoryOrCreate }
    - name: backups
      hostPath: { path: ./backups, type: DirectoryOrCreate }
