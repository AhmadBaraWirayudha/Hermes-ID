services:
  minio:
    image: docker.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: indomarket
      MINIO_ROOT_PASSWORD: indomarket-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data:Z

  create-bucket:
    image: docker.io/minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 indomarket indomarket-secret;
      mc mb -p local/indomarket-artifacts || true;
      mc anonymous set download local/indomarket-artifacts || true;
      "
volumes:
  minio_data:
